name: Diagnostic — dump trinity:opportunities

# Also dumps KuCoin's raw ticker for a probe symbol so we can see which
# field carries 24h volume (quoteVolume vs info.turnoverOf24h vs ...).

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Dump trinity:opportunities from Redis
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 1m
          script: |
            set -uo pipefail
            echo "=== git HEAD ==="
            cd /opt/ratebridge && git log -1 --oneline
            echo "=== trinity:opportunities (first 3 entries) ==="
            docker exec trinity-redis redis-cli GET trinity:opportunities | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(json.dumps(d.get('opportunities', [])[:3], indent=2)[:3000])"
            echo "=== git HEAD on server ==="
            cd /opt/ratebridge && git log -1 --oneline
            echo "=== git status (any local changes?) ==="
            cd /opt/ratebridge && git status --short
            echo "=== source files on server have new code? ==="
            grep -c "DISQ_REASON_EMOJI\|disqReason_" /opt/ratebridge/frontend/src/components/RightPanel.tsx 2>/dev/null && echo "RightPanel OK" || echo "RightPanel MISSING"
            grep -c "disqReason_vol_unknown" /opt/ratebridge/frontend/src/i18n/translations.ts 2>/dev/null && echo "translations OK" || echo "translations MISSING"
            echo "=== frontend bundle ==="
            BUILD_DIR=$(docker exec trinity-bot find /app/frontend/build/assets -name 'index-*.js' 2>/dev/null | head -1)
            echo "bundle: $BUILD_DIR"
            echo "DISQ count in bundle:" $(docker exec trinity-bot grep -c "DISQ_REASON_EMOJI\|disqReason_" "$BUILD_DIR" 2>/dev/null || echo 0)
            echo "=== bundle file modification time ==="
            docker exec trinity-bot ls -la /app/frontend/build/assets/ 2>/dev/null | head -10
            echo "=== docker images ==="
            docker images | grep ratebridge | head -3
            echo "=== first 200 chars of bundle ==="
            docker exec trinity-bot head -c 500 "$BUILD_DIR" 2>/dev/null | head -1
            echo "=== count of all OPP-related fields in bundle ==="
            for kw in disqualify_reason disqReason DISQ_REASON executable_status pnl_source; do
              cnt=$(docker exec trinity-bot grep -c "$kw" "$BUILD_DIR" 2>/dev/null || echo 0)
              echo "  $kw: $cnt"
            done
