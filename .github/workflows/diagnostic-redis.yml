name: Diagnostic — dump trinity:opportunities

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Dump trinity:opportunities from Redis
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 1m
          script: |
            set -uo pipefail
            echo "=== git HEAD ==="
            cd /opt/ratebridge && git log -1 --oneline
            echo "=== trinity:opportunities (first 3 entries) ==="
            docker exec trinity-redis redis-cli GET trinity:opportunities | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(json.dumps(d.get('opportunities', [])[:3], indent=2)[:3000])"
            echo "=== frontend bundle: does it include the new code? ==="
            BUILD_DIR=$(docker exec trinity-bot find /app/frontend/build/assets -name 'index-*.js' 2>/dev/null | head -1)
            echo "bundle: $BUILD_DIR"
            if [ -n "$BUILD_DIR" ]; then
              echo "DISQ_REASON_EMOJI found:" $(docker exec trinity-bot grep -c "DISQ_REASON_EMOJI\|disqualify_reason\|disqReason_" "$BUILD_DIR" 2>/dev/null || echo 0)
            fi
