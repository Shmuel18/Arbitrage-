<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="description" content="Trinity Arbitrage Bot Dashboard" />
    <title>Trinity Bot - Dashboard</title>
    <!-- Telegram WebApp SDK — only activates when the page is opened
         inside a Telegram Mini App; harmless on regular browsers. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function() {
        try {
          // Telegram Mini App overrides the stored theme with the client's
          // active color scheme. Detect and apply before React mounts so
          // there's no flash of wrong theme.
          var tgTheme = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.colorScheme;
          var t = tgTheme || localStorage.getItem('trinity_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
