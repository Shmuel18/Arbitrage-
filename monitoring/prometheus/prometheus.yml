global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    site: ratebridge-tokyo

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node_exporter
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: trinity_bot
    # Bot's /metrics endpoint (added later when prometheus_client is wired up)
    # Placeholder for now; Prometheus will mark it "down" until we expose it.
    metrics_path: /metrics
    static_configs:
      - targets: ['bot:8000']

  - job_name: redis
    static_configs:
      - targets: ['redis_exporter:9121']
