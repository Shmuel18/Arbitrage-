version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: trinity-redis
    command: redis-server --appendonly yes
    ports:
      # Bind only to localhost — do NOT expose Redis externally.
      # Docker normally bypasses UFW; this 127.0.0.1 binding is the fix.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
