version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: trinity-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      # Bind only to localhost — do NOT expose Redis externally.
      # Docker normally bypasses UFW; this 127.0.0.1 binding is the fix.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [trinity-net]

  bot:
    build: .
    container_name: trinity-bot
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGINS: https://${DOMAIN}
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    networks: [trinity-net]

  nginx:
    image: nginx:alpine
    container_name: trinity-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./nginx/logs:/var/log/nginx
    depends_on: [bot]
    restart: unless-stopped
    networks: [trinity-net]

  certbot:
    image: certbot/certbot
    container_name: trinity-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    networks: [trinity-net]

volumes:
  redis_data:
    driver: local

networks:
  trinity-net:
    driver: bridge
