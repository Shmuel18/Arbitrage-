version: "3.8"

# Hybrid deployment: bot + redis containerized, nginx/SSL stay native
# on the host. This keeps the existing Let's Encrypt setup stable while
# giving us isolation + reproducible builds for the bot itself.
#
# The native nginx (system service) proxies:
#   /           → static files at /opt/ratebridge/frontend/build
#   /api/*, /ws → 127.0.0.1:8000  (the bot container, mapped to host)
# Redis is bound to 127.0.0.1:6379 so only local processes can reach it.

# Cap container stdout/stderr so /var/lib/docker/containers/*-json.log
# can't fill the disk. 10 MB × 5 files = 50 MB ceiling per container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  redis:
    image: redis:7-alpine
    container_name: trinity-redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks: [trinity-net]

  bot:
    build: .
    container_name: trinity-bot
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # Inside the container, Redis is reachable via its service name.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Bind FastAPI to 0.0.0.0 so the host's 127.0.0.1:8000 port map works.
      API_BIND_HOST: "0.0.0.0"
      # uvloop, precompiled bytecode, no stdout buffering
      PYTHONUNBUFFERED: "1"
    ports:
      # Only accessible from the host's localhost — nginx proxies.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
      - ./frontend/build:/app/frontend/build:ro
    restart: unless-stopped
    logging: *default-logging
    networks: [trinity-net]
    # Higher priority + resource ceilings
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1500M

  # ── Monitoring stack ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: trinity-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    logging: *default-logging
    networks: [trinity-net]

  node_exporter:
    image: prom/node-exporter:latest
    container_name: trinity-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    restart: unless-stopped
    logging: *default-logging
    networks: [trinity-net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: trinity-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    restart: unless-stopped
    logging: *default-logging
    networks: [trinity-net]

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: trinity-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    expose:
      - "9121"
    depends_on: [redis]
    restart: unless-stopped
    logging: *default-logging
    networks: [trinity-net]

  grafana:
    image: grafana/grafana:latest
    container_name: trinity-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://ratebridge.live/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [prometheus]
    restart: unless-stopped
    logging: *default-logging
    networks: [trinity-net]

volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  trinity-net:
    driver: bridge
